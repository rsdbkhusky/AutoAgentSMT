# ========== 多Agent虚拟股市交易模拟系统 - 主配置文件 ==========

system:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"

# LLM 配置（OpenAI 兼容接口）
llm:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "sk-ea12206394f2408db43d64978c8e17da"
  model: "qwen3.5-plus"
  # model: "qwen3.5-flash"
  # base_url: "https://openrouter.ai/api/v1"
  # api_key: "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"
  # model: "qwen/qwen3.5-flash-02-23"
  # base_url: "https://api.siliconflow.cn/v1"
  # api_key: "sk-ckxnkfqoskvvfzbmmcxgkxgolhejlnwgeqegptdlgwnwlkbf"
  # model: "Qwen/Qwen3.5-35B-A3B"
  max_calls_per_minute: 30
  default_temperature: 0.7
  max_tokens: 1024
  retry_attempts: 3

# 模拟参数
simulation:
  total_rounds: 200
  round_interval_seconds: 3
  news_frequency: 5
  auto_start: true

# 虚拟时钟
clock:
  start_time: "2100-01-02 09:30:00"
  # time_step_minutes: 30
  time_step_minutes: 10
  trading_sessions:
    - ["09:30", "11:30"]
    - ["13:00", "15:00"]

# 撮合引擎
market:
  price_tick: 0.01
  max_order_quantity: 10000
  price_limit_pct: 0.10
  initial_market_maker_depth: 5
  market_maker_quantity: 1000

